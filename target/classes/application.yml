server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://10.7.54.137:3307/rpa_system?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL5InnoDBDialect
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL5InnoDBDialect

  thymeleaf:
    cache: false
    mode: HTML
    encoding: UTF-8
    prefix: classpath:/templates/
    suffix: .html

  redis:
    host: localhost
    port: 6379
    # password: 123456
    database: 0
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

# 自定义爬虫配置
scraper:
  # 请求间隔(毫秒)
  request-interval: 1000
  # 最大重试次数
  max-retry: 3
  # 代理列表(多个用逗号分隔)
  proxies:
  # 分布式协调
  redis-key-prefix: "rpa:scraper:"
  lock-timeout: 300

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
# DeepSeek AI配置
deepseek:
  api-url: https://api.deepseek.com/v1/chat/completions
  api-key: YOUR_DEEPSEEK_API_KEY
  model: deepseek-chat
  max-tokens: 2000
  temperature: 0.7

logging:
  level:
    root: INFO
    rpa: INFO
    # 关闭Hibernate SQL日志输出，减少性能开销
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

# 文件上传配置
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB
