server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://10.7.54.130:3307/rpa_system?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL5InnoDBDialect
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL5InnoDBDialect

  thymeleaf:
    cache: false
    mode: HTML
    encoding: UTF-8
    prefix: classpath:/templates/
    suffix: .html

  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

# 自定义爬虫配置
scraper:
  # 请求间隔(毫秒)
  request-interval: 1000
  # 最大重试次数
  max-retry: 3
  # 代理列表(多个用逗号分隔)
  proxies:
  # 分布式协调
  redis-key-prefix: "rpa:scraper:"
  lock-timeout: 300

logging:
  level:
    root: INFO
    rpa: DEBUG

# 文件上传配置
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB
