server:
  port: 8080
  address: 0.0.0.0

spring:
  datasource:
    url: jdbc:mysql://10.7.54.138:3307/rpa_system?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL5InnoDBDialect
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL5InnoDBDialect

  thymeleaf:
    cache: false
    mode: HTML
    encoding: UTF-8
    prefix: classpath:/templates/
    suffix: .html

  redis:
    host: localhost
    port: 6379
    # password: 123456
    database: 0
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

# 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # 邮件配置
  mail:
    host: smtp.163.com
    port: 465
    username: lwxiaoye@163.com
    password: MRUcD354DB97swKv
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          timeout: 5000
          ssl:
            enable: true
            socketFactory:
              class: javax.net.ssl.SSLSocketFactory
              port: 465
        debug: false

# DeepSeek AI配置
deepseek:
  api-url: https://api.deepseek.com/v1/chat/completions
  api-key: YOUR_DEEPSEEK_API_KEY
  model: deepseek-chat
  max-tokens: 2000
  temperature: 0.7

# RPA通知配置
rpa:
  notification:
    # 全局开关
    enabled: true
    # 任务完成通知
    task-complete:
      enabled: true
      include-result: true
      include-duration: true
    # 任务失败通知
    task-failed:
      enabled: true
      include-error: true
    # 系统告警通知
    alert:
      enabled: true
      recipients: lwxiaoye@163.com
    # 报表订阅通知
    subscription:
      enabled: true
      default-recipients: lwxiaoye@163.com
      # 报表访问地址（用于邮件中的链接）
      report-url: http://localhost:8080/rpa/reports
    # 附件配置
    attachment:
      enabled: true
      max-size: 10485760  # 10MB
      directory: ./attachments
    # 钉钉配置
    dingtalk:
      webhook: ${DINGTALK_WEBHOOK:}
    # 企业微信配置
    wecom:
      corp-id: ${WECOM_CORP_ID:}
      agent-id: ${WECOM_AGENT_ID:}
      secret: ${WECOM_SECRET:}
    # 飞书配置
    feishu:
      app-id: ${FEISHU_APP_ID:}
      app-secret: ${FEISHU_APP_SECRET:}
      webhook: ${FEISHU_WEBHOOK:}
    # 通知聚合配置
    aggregation:
      enabled: true
      flush-threshold: 10    # 达到此数量立即发送
      max-buffer-size: 100   # 单用户最大缓冲数量
      buffer-timeout-minutes: 30
