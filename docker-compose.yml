# RPA系统 Docker Compose - 完整生产环境部署
# 支持一键启动前后端完整服务

version: '3.8'

services:
  # ========== RPA后端服务 ==========
  rpa-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rpa-backend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://rpa-mysql:3306/rpa?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=rpa
      - SPRING_DATASOURCE_PASSWORD=rpa123456
      - SPRING_REDIS_HOST=rpa-redis
      - SPRING_REDIS_PORT=6379
      - JAVA_OPTS=-Xms512m -Xmx2048m -XX:+UseG1GC
    volumes:
      - ./logs:/app/logs
      - ./recordings:/app/recordings
      - ./templates:/app/templates
      - ./data:/app/data
    depends_on:
      rpa-mysql:
        condition: service_healthy
      rpa-redis:
        condition: service_started
    networks:
      - rpa-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ========== RPA前端服务 ==========
  rpa-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rpa-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-logs:/var/log/nginx
    depends_on:
      - rpa-backend
    networks:
      - rpa-network
    profiles:
      - full

  # ========== 数据库服务 ==========
  rpa-mysql:
    image: mysql:8.0
    container_name: rpa-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rpa_root_2024
      - MYSQL_DATABASE=rpa
      - MYSQL_USER=rpa
      - MYSQL_PASSWORD=rpa123456
      - TZ=Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=1000
      - --innodb_buffer_pool_size=512M
    networks:
      - rpa-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ========== 缓存服务 ==========
  rpa-redis:
    image: redis:7-alpine
    container_name: rpa-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1
    volumes:
      - redis-data:/data
    networks:
      - rpa-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ========== 网络定义 ==========
networks:
  rpa-network:
    driver: bridge
    name: rpa-network

# ========== 数据卷定义 ==========
volumes:
  mysql-data:
    name: rpa-mysql-data
  redis-data:
    name: rpa-redis-data
  frontend-logs:
    name: rpa-frontend-logs