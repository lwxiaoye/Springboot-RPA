# RPA系统 Docker Compose - 完整生产环境部署
# 支持一键启动前后端完整服务
#
# 使用方法:
#   1. cp .env.example .env  (复制环境变量文件)
#   2. 编辑 .env 填入实际配置
#   3. docker-compose up -d  (启动所有服务)
#   4. docker-compose ps     (查看服务状态)
#
# 单独启动后端+数据库:
#   docker-compose up -d rpa-backend rpa-mysql rpa-redis

version: '3.8'

services:
  # ========== RPA后端服务 ==========
  rpa-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rpa-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - DB_HOST=${DB_HOST:-rpa-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-rpa_system}
      - DB_URL=jdbc:mysql://${DB_HOST:-rpa-mysql}:${DB_PORT:-3306}/${DB_NAME:-rpa_system}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-123456}
      - SPRING_REDIS_HOST=${REDIS_HOST:-rpa-redis}
      - SPRING_REDIS_PORT=${REDIS_PORT:-6379}
      - SPRING_REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET}
      - JAVA_OPTS=${JAVA_OPTS:--Xms512m -Xmx2048m -XX:+UseG1GC}
      - TZ=Asia/Shanghai
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./templates:/app/templates
      - backend-data:/app/data
    depends_on:
      rpa-mysql:
        condition: service_healthy
      rpa-redis:
        condition: service_started
    networks:
      - rpa-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ========== RPA前端服务 ==========
  rpa-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rpa-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-logs:/var/log/nginx
    depends_on:
      - rpa-backend
    networks:
      - rpa-network
    profiles:
      - full

  # ========== 数据库服务 ==========
  rpa-mysql:
    image: mysql:8.0
    container_name: rpa-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
      - MYSQL_DATABASE=${DB_NAME:-rpa_system}
      - TZ=Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=1000
      - --innodb_buffer_pool_size=512M
    networks:
      - rpa-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ========== 缓存服务 ==========
  rpa-redis:
    image: redis:7-alpine
    container_name: rpa-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    networks:
      - rpa-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ========== 网络定义 ==========
networks:
  rpa-network:
    driver: bridge
    name: rpa-network

# ========== 数据卷定义 ==========
volumes:
  mysql-data:
    name: rpa-mysql-data
  redis-data:
    name: rpa-redis-data
  frontend-logs:
    name: rpa-frontend-logs
  backend-data:
    name: rpa-backend-data
