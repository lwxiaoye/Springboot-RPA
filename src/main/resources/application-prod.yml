# ============================================================
# RPA 系统 - 生产环境配置
# ============================================================
# 使用方式: SPRING_PROFILES_ACTIVE=prod docker-compose up -d
# 或设置环境变量覆盖默认值
# ============================================================

server:
  port: ${SERVER_PORT:8080}
  address: ${SERVER_ADDRESS:0.0.0.0}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:rpa_system}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:rpa_system}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    database-platform: org.hibernate.dialect.MySQL5InnoDBDialect
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQL5InnoDBDialect
        cache:
          use_second_level_cache: false
          use_query_cache: false

  thymeleaf:
    cache: true
    mode: HTML
    encoding: UTF-8
    prefix: classpath:/templates/
    suffix: .html

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: ${REDIS_TIMEOUT:10000ms}
    lettuce:
      pool:
        max-active: ${REDIS_POOL_MAX_ACTIVE:16}
        max-idle: ${REDIS_POOL_MAX_IDLE:8}
        min-idle: ${REDIS_POOL_MIN_IDLE:2}
        max-wait: ${REDIS_POOL_MAX_WAIT:5000ms}

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:50MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:100MB}
      enabled: true

  mail:
    host: ${MAIL_HOST:smtp.163.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:lwxiaoye@163.com}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          timeout: 5000
          ssl:
            enable: true
            socketFactory:
              class: javax.net.ssl.SSLSocketFactory
              port: 465
        debug: false

# JWT 配置
jwt:
  secret: ${JWT_SECRET:YourSecureProductionJwtSecretKeyMustBeAtLeast256Bits32Bytes}
  expiration: ${JWT_EXPIRATION:86400000}

# AI/LLM 配置
llm:
  provider: ${LLM_PROVIDER:deepseek}
  api-url: ${LLM_API_URL:}
  api-key: ${LLM_API_KEY:}
  model: ${LLM_MODEL:deepseek-chat}
  max-tokens: ${LLM_MAX_TOKENS:2000}
  temperature: ${LLM_TEMPERATURE:0.7}

deepseek:
  api-url: ${DEEPSEEK_API_URL:https://api.deepseek.com/v1/chat/completions}
  api-key: ${DEEPSEEK_API_KEY:}
  model: ${DEEPSEEK_MODEL:deepseek-chat}
  max-tokens: ${DEEPSEEK_MAX_TOKENS:2000}
  temperature: ${DEEPSEEK_TEMPERATURE:0.7}

mimo:
  api-url: ${MIMO_API_URL:https://api.xiaomimimo.com/v1/chat/completions}
  api-key: ${MIMO_API_KEY:}
  model: ${MIMO_MODEL:mimo-7b-chat}
  max-tokens: ${MIMO_MAX_TOKENS:2000}
  temperature: ${MIMO_TEMPERATURE:0.7}

# RPA 通知配置
rpa:
  notification:
    enabled: ${NOTIFICATION_ENABLED:true}
    task-complete:
      enabled: ${NOTIFICATION_TASK_COMPLETE:true}
      include-result: true
      include-duration: true
    task-failed:
      enabled: ${NOTIFICATION_TASK_FAILED:true}
      include-error: true
    alert:
      enabled: ${NOTIFICATION_ALERT:true}
      recipients: ${NOTIFICATION_ALERT_RECIPIENTS:}
    subscription:
      enabled: ${NOTIFICATION_SUBSCRIPTION:true}
      default-recipients: ${NOTIFICATION_SUBSCRIPTION_RECIPIENTS:}
      report-url: ${NOTIFICATION_REPORT_URL:}
    attachment:
      enabled: ${ATTACHMENT_ENABLED:true}
      max-size: ${ATTACHMENT_MAX_SIZE:10485760}
      directory: ${ATTACHMENT_DIRECTORY:/app/attachments}
    dingtalk:
      webhook: ${DINGTALK_WEBHOOK:}
    wecom:
      corp-id: ${WECOM_CORP_ID:}
      agent-id: ${WECOM_AGENT_ID:}
      secret: ${WECOM_SECRET:}
    feishu:
      app-id: ${FEISHU_APP_ID:}
      app-secret: ${FEISHU_APP_SECRET:}
      webhook: ${FEISHU_WEBHOOK:}
    aggregation:
      enabled: ${NOTIFICATION_AGGREGATION:true}
      flush-threshold: 10
      max-buffer-size: 100
      buffer-timeout-minutes: 30

# CORS 配置
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}

# 日志配置
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    rpa: ${LOG_LEVEL_RPA:INFO}
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE_PATH:/app/logs/rpa.log}
    max-size: ${LOG_FILE_MAX_SIZE:100MB}
    max-history: ${LOG_FILE_MAX_HISTORY:30}

# 文件上传配置
upload:
  path: ${UPLOAD_PATH:/app/uploads}
  allowed-types: ${UPLOAD_ALLOWED_TYPES:image/jpeg,image/png,image/gif,application/pdf}
  max-size: ${UPLOAD_MAX_SIZE:52428800}
