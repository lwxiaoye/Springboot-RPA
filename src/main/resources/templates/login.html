<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPA 系统 - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 400px;
        }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header h1 { color: #333; font-size: 28px; margin-bottom: 10px; }
        .login-header p { color: #666; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .message {
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            display: none;
        }
        .message.error { background-color: #fee; color: #c33; border: 1px solid #fcc; }
        .message.success { background-color: #efe; color: #3c3; border: 1px solid #cfc; }
        
        .forgot-password-link {
            text-align: right;
            margin-top: -10px;
            margin-bottom: 20px;
        }
        .forgot-password-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        .forgot-password-link a:hover {
            text-decoration: underline;
        }
        
        /* 忘记密码弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .modal-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .modal-header h2 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .modal-header p {
            color: #666;
            font-size: 14px;
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        .modal-close:hover { color: #333; }
        .step-container { display: none; }
        .step-container.active { display: block; }

    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>RPA 系统</h1>
            <p>机器人流程自动化平台</p>
        </div>
        <div id="message" class="message"></div>
        <form id="loginForm">
            <div class="form-group">
                <label for="account">用户名/手机号</label>
                <input type="text" id="account" name="account" required placeholder="请输入用户名或手机号">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required placeholder="请输入密码">
            </div>
            <div class="forgot-password-link">
                <a href="#" onclick="showForgotPasswordModal(); return false;">忘记密码？</a>
            </div>
            <button type="submit" class="btn">登录</button>
        </form>
    </div>
    
    <!-- 忘记密码弹窗 -->
    <div id="forgotPasswordModal" class="modal-overlay">
        <div class="modal">
            <button class="modal-close" onclick="closeForgotPasswordModal()">&times;</button>
            <div class="modal-header">
                <h2>忘记密码</h2>
                <p>通过邮箱或手机号重置密码</p>
            </div>
            
            <!-- 步骤 1: 验证身份 -->
            <div id="step1" class="step-container active">
                <div class="form-group">
                    <label for="resetAccount">用户名/手机号/邮箱</label>
                    <input type="text" id="resetAccount" placeholder="请输入用户名、手机号或邮箱">
                </div>
                <button class="btn" onclick="sendVerificationCode()">发送验证码</button>
            </div>
            
            <!-- 步骤 2: 输入验证码 -->
            <div id="step2" class="step-container">
                <div class="form-group">
                    <label for="verificationCode">验证码</label>
                    <input type="text" id="verificationCode" placeholder="请输入 6 位验证码">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn" onclick="verifyCode()" style="flex: 1;">验证</button>
                    <button class="btn" onclick="resendCode()" style="background: #e5e7eb; color: #4b5563; flex: 1;">重新发送</button>
                </div>
            </div>
            
            <!-- 步骤 3: 重置密码 -->
            <div id="step3" class="step-container">
                <div class="form-group">
                    <label for="newResetPassword">新密码</label>
                    <input type="password" id="newResetPassword" placeholder="请输入新密码">
                </div>
                <div class="form-group">
                    <label for="confirmResetPassword">确认密码</label>
                    <input type="password" id="confirmResetPassword" placeholder="请再次输入新密码">
                </div>
                <button class="btn" onclick="resetPasswordSubmit()">重置密码</button>
            </div>
            
            <div id="resetMessage" class="message" style="margin-top: 20px;"></div>
        </div>
    </div>
    <script>
        // 校验函数
        function validateAccount(account) {
            if (!account || account.trim().length === 0) {
                return '请输入用户名或手机号';
            }
            if (account.length > 50) {
                return '用户名或手机号长度不能超过 50 个字符';
            }
            // 如果是手机号，校验格式
            const phoneRegex = /^[0-9]{11}$/;
            if (phoneRegex.test(account)) {
                return ''; // 有效的手机号
            }
            // 如果不是手机号，检查是否包含特殊字符
            const specialCharRegex = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/;
            if (specialCharRegex.test(account)) {
                return '用户名不能包含特殊字符';
            }
            return '';
        }

        function validatePassword(password) {
            if (!password || password.length === 0) {
                return '请输入密码';
            }
            if (password.length < 6) {
                return '密码长度至少为 6 位';
            }
            if (password.length > 20) {
                return '密码长度不能超过 20 位';
            }
            return '';
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
            setTimeout(() => { messageDiv.style.display = 'none'; }, 3000);
        }
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const account = document.getElementById('account').value;
            const password = document.getElementById('password').value;
            
            // 前端校验
            const accountError = validateAccount(account);
            if (accountError) {
                showMessage(accountError, 'error');
                return;
            }
            
            const passwordError = validatePassword(password);
            if (passwordError) {
                showMessage(passwordError, 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/user/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ account, password })
                });
                const result = await response.json();
                if (result.code === 0) {
                    localStorage.setItem('user', JSON.stringify(result.data));
                    
                    // 检查密码是否过期
                    if (result.data.passwordExpired) {
                        showMessage('您的密码已过期，需要修改密码', 'error');
                        // 跳转到密码修改页面或显示提示
                        setTimeout(() => { 
                            window.location.href = '/dashboard.html?changePassword=true'; 
                        }, 1500);
                    } else {
                        showMessage('登录成功，正在跳转...', 'success');
                        setTimeout(() => { window.location.href = '/dashboard.html'; }, 1000);
                    }
                } else {
                    showMessage(result.message, 'error');
                }
            } catch (error) {
                showMessage('登录失败，请稍后重试', 'error');
            }
        });
        
        // ========== 忘记密码功能 ==========
        let resetUserId = null;
        let resetVerificationCode = null;
        
        function showForgotPasswordModal() {
            document.getElementById('forgotPasswordModal').classList.add('show');
            resetStep1();
        }
        
        function closeForgotPasswordModal() {
            document.getElementById('forgotPasswordModal').classList.remove('show');
        }
        
        function resetStep1() {
            document.getElementById('step1').classList.add('active');
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step3').classList.remove('active');
            document.getElementById('resetAccount').value = '';
            document.getElementById('verificationCode').value = '';
            document.getElementById('newResetPassword').value = '';
            document.getElementById('confirmResetPassword').value = '';
            hideResetMessage();
        }
        
        function showResetMessage(text, type) {
            const messageDiv = document.getElementById('resetMessage');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
        }
        
        function hideResetMessage() {
            document.getElementById('resetMessage').style.display = 'none';
        }
        
        async function sendVerificationCode() {
            const account = document.getElementById('resetAccount').value.trim();
            if (!account) {
                showResetMessage('请输入用户名、手机号或邮箱', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/user/send-reset-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ account })
                });
                const result = await response.json();
                
                if (result.code === 0) {
                    resetUserId = result.data.userId;
                    resetVerificationCode = result.data.code; // 实际应用中应该从后端发送，这里模拟
                    showResetMessage('验证码已发送，请查收！', 'success');
                    setTimeout(() => {
                        document.getElementById('step1').classList.remove('active');
                        document.getElementById('step2').classList.add('active');
                        hideResetMessage();
                    }, 1000);
                } else {
                    showResetMessage(result.message, 'error');
                }
            } catch (error) {
                showResetMessage('发送验证码失败，请稍后重试', 'error');
            }
        }
        
        function verifyCode() {
            const code = document.getElementById('verificationCode').value.trim();
            if (!code) {
                showResetMessage('请输入验证码', 'error');
                return;
            }
            
            // 简单验证（实际应该调用后端 API）
            if (code === resetVerificationCode || code === '123456') { // 测试用固定验证码
                document.getElementById('step2').classList.remove('active');
                document.getElementById('step3').classList.add('active');
                hideResetMessage();
            } else {
                showResetMessage('验证码错误，请重新输入', 'error');
            }
        }
        
        function resendCode() {
            sendVerificationCode();
        }
        
        function validateResetPassword(password) {
            if (!password || password.length < 8 || password.length > 24) {
                return '密码长度必须在 8-24 位之间';
            }
            
            let hasLetter = false;
            let hasDigit = false;
            let hasSpecialChar = false;
            
            for (let c of password) {
                if (/[a-zA-Z]/.test(c)) hasLetter = true;
                else if (/[0-9]/.test(c)) hasDigit = true;
                else hasSpecialChar = true;
            }
            
            if (!hasLetter || !hasDigit || !hasSpecialChar) {
                return '密码必须包含字母、数字和特殊字符';
            }
            
            return '';
        }
        
        async function resetPasswordSubmit() {
            const newPwd = document.getElementById('newResetPassword').value;
            const confirmPwd = document.getElementById('confirmResetPassword').value;
            
            if (!newPwd) {
                showResetMessage('请输入新密码', 'error');
                return;
            }
            
            const pwdError = validateResetPassword(newPwd);
            if (pwdError) {
                showResetMessage(pwdError, 'error');
                return;
            }
            
            if (newPwd !== confirmPwd) {
                showResetMessage('两次输入的密码不一致', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/user/reset-password-by-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: resetUserId,
                        newPassword: newPwd
                    })
                });
                const result = await response.json();
                
                if (result.code === 0) {
                    showResetMessage('密码重置成功！', 'success');
                    setTimeout(() => {
                        closeForgotPasswordModal();
                        alert('密码重置成功，请使用新密码登录');
                    }, 1000);
                } else {
                    showResetMessage(result.message, 'error');
                }
            } catch (error) {
                showResetMessage('密码重置失败，请稍后重试', 'error');
            }
        }
    </script>
</body>
</html>
